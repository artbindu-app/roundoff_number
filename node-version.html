<!doctype html>
<html>
  <head>
    <style>
      body {
        background-color: #d9e4cb;
      }

      .center {
        margin: auto;
        width: 40%;
        border: 3px solid #73ad21;
        padding: 10px;
      }

      table {
        width: 100%;
        border: 2px solid black;
      }

      th {
        border: 1px solid #73ad21;
      }

      td {
        text-align: center;
        border: 1px solid #73ad21;
      }
    </style>

  </head>

  <body>
    <div class="center">
      <h2 style="text-align:center">Deprecated version are skipped</h2>
      <div id="output"></div>
    </div>

    <!-- <script src="index.js"></script> -->
    <script>
      let getAllData = [];
      let releaseSchedule = {};
      const getReleaseURL = (version) =>
        version ? `https://nodejs.org/download/release/v${version}/` : "";
      const getTitle = (version) =>
        getAllData.filter((ele) => ele.version === `v${version}`)[0].lts;
      const getReleaseInfo = (version) =>
        version
          ? `https://github.com/nodejs/node/releases/tag/v${version}/`
          : "";
      const getDate = (version) =>
        getAllData.filter((x) => x.version.includes(`v${version}`))[0]?.date;

      function showCombinedData(arr1, arr2) {
        // Skip deprecated Node.js versions
        for (let i = 0; i < arr1.length; i++) {
            if (isDeprecated(arr1[i].version.replace(/^v/, ""))) {
                arr1.splice(i, 1);
                i--;
            }
        }

        for (let i = 0; i < arr2.length; i++) {
            if (isDeprecated(arr2[i].version.replace(/^v/, ""))) {
                arr2.splice(i, 1);
                i--;
            }
        }
        if (arr1.length < arr2.length) {
          let _temp = arr1;
          arr1 = arr2;
          arr2 = _temp;
        }
        
        let st = `<table>`;
        st += `<tr>
                      <th>CURRENT</th>
                      <th>LTS Version</th>
                  </tr>`;

        for (let i = 0; i < arr2.length; i++) {
          const currentVersion = arr1[i].version.replace(/v/gi, "");
          const ltsVersion = arr2[i].version.replace(/v/gi, "");

          const isCurrentVersionSecure = arr1[i].security ? "🛡️" : "";
          const isLTSVersionSecure = arr2[i].security ? "🛡️" : "";

          st += `<tr>
                <th>
                    <a href="${getReleaseInfo(currentVersion)}" target="blank" title="View Release Note">
                        Release Note
                    </a> :
                    <a href="${getReleaseURL(currentVersion)}" target="blank" title="Current Version">
                        ${currentVersion}${isCurrentVersionSecure}
                    </a> (${getDate(currentVersion)})
                </th>
                <th>
                    <a href="${getReleaseInfo(ltsVersion)}" target="blank" title="View Release Note">
                        ${getTitle(ltsVersion)}${isLTSVersionSecure}
                    </a> :
                    <a href="${getReleaseURL(ltsVersion)}" target="blank" title="LTS">
                        ${ltsVersion}
                    </a> (${getDate(ltsVersion)})
                </th>
            </tr>`;
        }

        st += `</table>`;
        document.getElementById("output").innerHTML = st;
      }

      function isDeprecated(version) {
        const major = version.replace(/^v/, "").split(".")[0];
        const schedule = releaseSchedule[`v${major}`];

        if (!schedule?.end) {
          return false;
        }

        return Date.now() > Date.parse(schedule.end);
      }

      function getRequestCall() {
        Promise.all([
          fetch("https://nodejs.org/dist/index.json").then((r) => r.json()),
          fetch(
            "https://raw.githubusercontent.com/nodejs/Release/main/schedule.json",
          ).then((r) => r.json()),
        ])
          .then(([versions, schedule]) => {
            getAllData = versions;
            releaseSchedule = schedule;

            const ltsNodeVersions = getAllData.filter(x => x.lts !== false);
            const currentNodeVersions = getAllData.filter(x => x.lts === false);

            showCombinedData(currentNodeVersions, ltsNodeVersions);
          })
          .catch((error) => {
            console.error("Request failed:", error);
          });
      }

      getRequestCall();
    </script>
  </body>
</html>
